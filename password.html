<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Proyecto para aprender rompiendo el código." />

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/style.css" />

  <link rel="icon" href="./img/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="./img/favicon.png" type="image/png">

  <title>Proyect Break | Generador de contraseñas seguras</title>
</head>

<body>
  <header id="header" class="header"></header>

  <main class="main">
  <div class="pass">
    <div class="title">
    <h1>Crea tu contraseña segura</h1>
    <i id="lockIcon" data-lucide="lock-keyhole-open"></i>
    </div>

  <div id="passwordForm" class="password-form">
    <label for="length">Número de caracteres de la contraseña</label>
    <input type="number" id="length" name="length" min="12" max="50" value="12">

    <button type="button" id="generateBtn" class="generate-btn">
      Generar contraseña
    </button>

    <div id="passwordResult" class="password-result" aria-live="polite" role="status"></div></div>
  </div>
  </div>
  </main>

  <script src="https://unpkg.com/lucide@0.378.0"></script>
  <script type="module" src="./js/main.js"></script>
  <script type="module" src="./js/password.js"></script>
  <script type="module" src="./js/background.js"></script>
</body>
</html>
